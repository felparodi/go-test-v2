<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego WebSocket - Triángulos con Ojos</title>
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="gameContainer">
        <div id="info">
            <h2>🎮 Triángulos con <span>Ojos</span></h2>
            
            <div id="controls-info">
                <p>
                    <span class="highlight-blue">⬆️⬇️⬅️➡️</span> Movimiento | 
                    <span class="highlight-orange">🔄</span> El triángulo apunta hacia donde te mueves
                </p>
                <p>
                    <span class="highlight-blue">🔵 Tú</span> | 
                    <span class="highlight-orange">🔴 Otros Jugadores</span>
                </p>
                <p style="font-size: 12px; margin-top: 5px; color: #888;">
                    Usa <span class="key-hint">W</span><span class="key-hint">A</span><span class="key-hint">S</span><span class="key-hint">D</span> 
                    o <span class="key-hint">↑</span><span class="key-hint">↓</span><span class="key-hint">←</span><span class="key-hint">→</span>
                </p>
            </div>
            
            <div class="stats">
                <div class="stat-box">🏆 <span id="score">0</span></div>
                <div class="stat-box">⚡ <span id="fps">0</span> FPS</div>
                <div class="stat-box">👥 <span id="players">1</span> jugadores</div>
            </div>
            
            <div id="connectionStatus" class="status-connecting">🟡 Conectando...</div>
        </div>
        
        <canvas id="gameCanvas" width="800" height="600"></canvas>
    </div>

    <!-- JavaScript - Orden de carga importante -->
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/network.js"></script>
    <script src="js/input.js"></script>
    <script src="js/renderer.js"></script>
    <script src="js/game.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
