<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>WebSocket Chat</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background: #f0f0f0;
        }
        #chat {
            width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            padding: 20px;
        }
        #messages {
            height: 400px;
            border: 1px solid #ddd;
            overflow-y: auto;
            padding: 10px;
            margin-bottom: 10px;
            background: #fafafa;
            border-radius: 5px;
        }
        .message {
            margin: 5px 0;
            padding: 8px 12px;
            background: #e3f2fd;
            border-radius: 5px;
        }
        .message.own {
            background: #c8e6c9;
            text-align: right;
        }
        #input-area {
            display: flex;
            gap: 10px;
        }
        #message-input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        #send-btn {
            padding: 10px 20px;
            background: #2196F3;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        #send-btn:hover {
            background: #1976D2;
        }
        .status {
            color: #888;
            font-size: 12px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div id="chat">
        <h2>Chat WebSocket</h2>
        <div id="status" class="status">Conectando...</div>
        <div id="messages"></div>
        <div id="input-area">
            <input type="text" id="message-input" placeholder="Escribe un mensaje..." />
            <button id="send-btn">Enviar</button>
        </div>
    </div>

    <script>
        let ws;
        let username = prompt("Ingresa tu nombre de usuario:");

        function connect() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws`;
            
            ws = new WebSocket(wsUrl);

            ws.onopen = function() {
                document.getElementById('status').textContent = `Conectado como: ${username}`;
                document.getElementById('status').style.color = 'green';
            };

            ws.onmessage = function(event) {
                const messagesDiv = document.getElementById('messages');
                const message = document.createElement('div');
                message.className = 'message';
                
                try {
                    const data = JSON.parse(event.data);
                    if (data.username === username) {
                        message.className += ' own';
                        message.textContent = `Tú: ${data.text}`;
                    } else {
                        message.textContent = `${data.username}: ${data.text}`;
                    }
                } catch (e) {
                    message.textContent = event.data;
                }
                
                messagesDiv.appendChild(message);
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            };

            ws.onclose = function() {
                document.getElementById('status').textContent = 'Desconectado - Reconectando...';
                document.getElementById('status').style.color = 'red';
                setTimeout(connect, 3000);
            };

            ws.onerror = function(error) {
                console.error('Error WebSocket:', error);
            };
        }

        function sendMessage() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            
            if (text && ws && ws.readyState === WebSocket.OPEN) {
                const message = JSON.stringify({
                    username: username,
                    text: text
                });
                ws.send(message);
                input.value = '';
            }
        }

        // Conectar
        connect();

        // Event listeners
        document.getElementById('send-btn').addEventListener('click', sendMessage);
        document.getElementById('message-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>
</html>
